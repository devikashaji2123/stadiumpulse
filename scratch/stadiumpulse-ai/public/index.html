<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StadiumPulse AI – Emergency Coordinator | FIFA World Cup 2026</title>
  
  <!-- Font Integrations -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Custom Tailwind Config -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui'],
            outfit: ['Outfit', 'sans-serif']
          },
          colors: {
            pulse: {
              red: {
                50: '#fef2f2',
                100: '#fee2e2',
                500: '#ef4444',
                600: '#dc2626',
                700: '#b91c1c',
                950: '#450a0a',
              },
              blue: {
                50: '#eff6ff',
                100: '#dbeafe',
                500: '#3b82f6',
                600: '#2563eb',
                700: '#1d4ed8',
                950: '#172554',
              },
              dark: {
                bg: '#070a13',
                card: '#0f1424',
                border: '#1e2942',
                text: '#f3f4f6'
              }
            }
          },
          animation: {
            'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'spin-slow': 'spin 3s linear infinite',
          }
        }
      }
    }
  </script>

  <!-- Core CDNs: React, ReactDOM, Babel, Recharts, Lucide Icons -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Canvas Confetti for Resolution Celebrations -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    /* Premium Glassmorphism & Custom scrollbar styling */
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow-x: hidden;
    }
    
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    
    .dark ::-webkit-scrollbar-thumb {
      background: #1e2942;
      border-radius: 99px;
    }
    
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 99px;
    }
    
    .glass-panel {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    
    /* Emergency blinking highlights */
    @keyframes critical-glow {
      0%, 100% { box-shadow: 0 0 15px rgba(239, 68, 68, 0.6); border-color: rgba(239, 68, 68, 0.8); }
      50% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.3); }
    }
    
    .alert-critical {
      animation: critical-glow 2s infinite;
    }
    
    @keyframes high-glow {
      0%, 100% { box-shadow: 0 0 15px rgba(249, 115, 22, 0.5); border-color: rgba(249, 115, 22, 0.7); }
      50% { box-shadow: 0 0 5px rgba(249, 115, 22, 0.2); border-color: rgba(249, 115, 22, 0.3); }
    }
    
    .alert-high {
      animation: high-glow 2.5s infinite;
    }

    /* Map animation effects */
    @keyframes path-pulse {
      0% { stroke-dashoffset: 24; }
      100% { stroke-dashoffset: 0; }
    }

    .evac-path {
      stroke-dasharray: 8, 4;
      animation: path-pulse 1.5s linear infinite;
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-pulse-dark-bg text-slate-800 dark:text-slate-200 transition-colors duration-300">
  <div id="root"></div>

  <!-- Loading State placeholder -->
  <div id="app-loading" class="fixed inset-0 flex flex-col items-center justify-center bg-pulse-dark-bg z-50">
    <div class="relative w-20 h-20">
      <div class="absolute inset-0 rounded-full border-4 border-pulse-blue-600/30"></div>
      <div class="absolute inset-0 rounded-full border-4 border-t-pulse-red-500 border-r-pulse-blue-500 animate-spin"></div>
      <div class="absolute inset-4 rounded-full bg-pulse-dark-card flex items-center justify-center">
        <span class="text-xs font-bold text-pulse-red-500 animate-pulse">SP</span>
      </div>
    </div>
    <h2 class="mt-6 text-xl font-bold font-outfit text-white tracking-widest uppercase">StadiumPulse AI</h2>
    <p class="mt-2 text-sm text-slate-400">Loading Command Center Panel...</p>
  </div>

  <!-- React Babel app script -->
  <script type="text/babel" src="app.js"></script>
</body>
</html>
